name: Setup
description: Installs tools and dependencies

runs:
  using: composite
  steps:
    - uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: asdf-cache
      with:
        key: asdf-${{ hashFiles('.tool-versions') }}
        restore-keys: asdf-
        path: |
          ${{ env.ASDF_DIR }}/plugins
          ${{ env.ASDF_DIR }}/installs
    - if: steps.asdf-cache.outputs.cache-hit != 'true'
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
    - if: steps.asdf-cache.outputs.cache-hit == 'true'
      shell: bash
      run: asdf reshim
    - name: Elixir tools
      if: steps.asdf-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mix local.rebar --force
        mix local.hex --force

    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: ex-deps-cache
      with:
        path: |
          _build
          deps
        key: ex-deps-${{ hashFiles('.tool-versions', '**/mix.lock') }}
    - name: Elixir dependencies
      if: steps.ex-deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mix deps.get
        mix deps.compile

    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      id: js-deps-cache
      with:
        path: assets/node_modules
        key: js-deps-${{ hashFiles('.tool-versions', '**/package-lock.json') }}
    - name: JS dependencies
      if: steps.js-deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --prefix assets
