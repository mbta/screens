version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      time: "10:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: weekly
      time: "10:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      mix-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: npm
    directory: "/assets"
    schedule:
      interval: weekly
      time: "10:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      npm-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      eslint:
        patterns:
          - "eslint*"
          - "*-eslint"
          - "@eslint*"
        update-types:
          - "major"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"
      testing-tools:
        patterns:
          - "ts-jest"
          - "jest*"
          - "@jest*"
        update-types:
          - "major"
      babel:
        patterns:
          - "@babel*"
        update-types:
          - "major"
      webpack:
        patterns:
          - "webpack*"
          - "*webpack-plugin"
          - "@svgr/webpack"
          - "@types/webpack-env"
          - "*-loader"
          - "terser*"
        update-types:
          - "major"
      moment:
        patterns:
          - "moment*"
        update-types:
          - "major"
